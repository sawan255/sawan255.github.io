<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <meta name="description" content="Login and account options." />
    <style>
      :root {
        --bg: #0b0d12;
        --bg-2: #141926;
        --text: #f2f5ff;
        --muted: #b8c2e0;
        --accent: #4ad9ff;
        --card: rgba(10, 12, 18, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 10% 10%, #1d2440 0%, transparent 55%),
          radial-gradient(1000px 500px at 90% 20%, #0e3a4a 0%, transparent 60%),
          linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .card {
        width: min(480px, 100%);
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: clamp(22px, 5vw, 40px);
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.6;
      }

      .btn {
        width: 100%;
        border: none;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn.primary {
        background: linear-gradient(135deg, var(--accent), #1de7b7);
        color: #001018;
        box-shadow: 0 12px 30px rgba(74, 217, 255, 0.25);
      }

      .btn.secondary {
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .tab-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 18px 0 16px;
      }

      .tab {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .tab.active {
        border-color: var(--accent);
        background: rgba(74, 217, 255, 0.18);
        color: var(--text);
      }

      form {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text);
        font-size: 1rem;
      }

      .small {
        margin-top: 14px;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.5);
      }

      .link {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Login to Cobra</h1>
      <p>Sign in or create a local account to continue.</p>

      <div class="tab-row">
        <button class="tab active" id="tabLogin" type="button">Login</button>
        <button class="tab" id="tabSignup" type="button">Sign up</button>
      </div>

      <button class="btn primary" id="googleBtn" type="button">
        Sign in with Gmail
      </button>
      <a class="btn secondary" id="offlineBtn" href="home.html"
        >Continue (Beta Testing)</a
      >

      <form id="loginForm">
        <input id="loginEmail" type="email" placeholder="Email" required />
        <input id="loginPass" type="password" placeholder="Password" required />
        <button class="btn secondary" type="submit">Login & Continue</button>
      </form>

      <form id="signupForm" hidden>
        <input id="signupName" type="text" placeholder="Full Name" required />
        <input id="signupEmail" type="email" placeholder="Email" required />
        <input id="signupPass" type="password" placeholder="Password" required />
        <button class="btn secondary" type="submit">Create Account</button>
      </form>

      <div class="small" id="authMsg"></div>

      <div class="small">
        This is a frontend-only demo. We will connect real login later.
        <a class="link" href="index.html">Back to Welcome</a>
      </div>
    </main>
    <script>
      const tabLogin = document.getElementById("tabLogin");
      const tabSignup = document.getElementById("tabSignup");
      const loginForm = document.getElementById("loginForm");
      const signupForm = document.getElementById("signupForm");

      function showLogin() {
        tabLogin.classList.add("active");
        tabSignup.classList.remove("active");
        loginForm.hidden = false;
        signupForm.hidden = true;
      }

      function showSignup() {
        tabSignup.classList.add("active");
        tabLogin.classList.remove("active");
        signupForm.hidden = false;
        loginForm.hidden = true;
      }

      tabLogin.addEventListener("click", showLogin);
      tabSignup.addEventListener("click", showSignup);

      document.getElementById("offlineBtn").addEventListener("click", () => {
        localStorage.setItem("offline_mode", "1");
      });
    </script>
    <script type="module">
      import {
        auth,
        googleProvider,
      } from "./firebase-config.js";
      import {
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        updateProfile,
        signInWithPopup,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

      const loginForm = document.getElementById("loginForm");
      const signupForm = document.getElementById("signupForm");
      const authMsg = document.getElementById("authMsg");
      const googleBtn = document.getElementById("googleBtn");

      function showMsg(text) {
        authMsg.textContent = text;
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value.trim();
        const pass = document.getElementById("loginPass").value;
        try {
          await signInWithEmailAndPassword(auth, email, pass);
          window.location.href = "home.html";
        } catch (err) {
          showMsg(err.message);
        }
      });

      signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("signupName").value.trim();
        const email = document.getElementById("signupEmail").value.trim();
        const pass = document.getElementById("signupPass").value;
        try {
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          if (name) {
            await updateProfile(cred.user, { displayName: name });
          }
          window.location.href = "home.html";
        } catch (err) {
          showMsg(err.message);
        }
      });

      googleBtn.addEventListener("click", async () => {
        try {
          await signInWithPopup(auth, googleProvider);
          window.location.href = "home.html";
        } catch (err) {
          showMsg(err.message);
        }
      });
    </script>
  </body>
</html>
