<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PythonVault</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="welcome-page">
    <div id="shader-bg" class="shader-bg" aria-hidden="true"></div>

    <section class="welcome-overlay">
      <p class="eyebrow">PythonVault</p>
      <h1>Welcome</h1>
      <p class="lead welcome-lead">
        Open the download page to get the PythonVault.zip file from your website.
      </p>
      <div class="actions">
        <a class="button primary" href="download.html">Open Download Page</a>
      </div>
    </section>
  </main>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const container = document.getElementById('shader-bg');

    if (container) {
      const camera = new THREE.Camera();
      camera.position.z = 1;

      const scene = new THREE.Scene();
      const geometry = new THREE.PlaneGeometry(2, 2);

      const uniforms = {
        time: { value: 1.0 },
        resolution: { value: new THREE.Vector2() },
      };

      const material = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: `
          void main() {
            gl_Position = vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          precision highp float;
          uniform vec2 resolution;
          uniform float time;

          void main(void) {
            vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
            float t = time * 0.05;
            float lineWidth = 0.002;

            vec3 color = vec3(0.0);
            for (int j = 0; j < 3; j++) {
              for (int i = 0; i < 5; i++) {
                color[j] += lineWidth * float(i * i) / abs(fract(t - 0.01 * float(j) + float(i) * 0.01) * 5.0 - length(uv) + mod(uv.x + uv.y, 0.2));
              }
            }

            gl_FragColor = vec4(color[0], color[1], color[2], 1.0);
          }
        `,
      });

      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const onResize = () => {
        const width = container.clientWidth;
        const height = container.clientHeight;
        renderer.setSize(width, height);
        uniforms.resolution.value.x = renderer.domElement.width;
        uniforms.resolution.value.y = renderer.domElement.height;
      };

      onResize();
      window.addEventListener('resize', onResize);

      const animate = () => {
        uniforms.time.value += 0.05;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      };

      animate();
    }
  </script>
</body>
</html>
