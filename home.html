<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home</title>
    <meta name="description" content="Home page shell." />
    <style>
      :root {
        --bg: #0b0d12;
        --bg-2: #141926;
        --text: #f2f5ff;
        --muted: #b8c2e0;
        --accent: #4ad9ff;
        --card: rgba(10, 12, 18, 0.7);
        --surface: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
      }

      body.light {
        --bg: #f7f8fb;
        --bg-2: #dfe6f1;
        --text: #0c1222;
        --muted: #4d5b77;
        --accent: #1a8cff;
        --card: rgba(255, 255, 255, 0.9);
        --surface: rgba(255, 255, 255, 0.7);
        --border: rgba(12, 18, 34, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 10% 10%, #1d2440 0%, transparent 55%),
          radial-gradient(1000px 500px at 90% 20%, #0e3a4a 0%, transparent 60%),
          linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
        min-height: 100vh;
        padding: 0;
        transition: background 0.3s ease, color 0.3s ease;
      }

      .topbar {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(12px);
        background: rgba(0, 0, 0, 0.1);
      }

      body.light .topbar {
        background: rgba(255, 255, 255, 0.6);
      }

      .menu-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 1.2rem;
        cursor: pointer;
      }

      .page {
        min-height: calc(100vh - 64px);
        padding: 16px 24px 32px;
        display: grid;
        gap: 20px;
      }

      .home-title {
        font-size: clamp(1.3rem, 3.5vw, 1.8rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 10px 18px;
        border-radius: 999px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        text-transform: uppercase;
        justify-self: center;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 280px;
        background: var(--card);
        border-right: 1px solid var(--border);
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        display: flex;
        flex-direction: column;
        padding: 20px;
        gap: 18px;
        z-index: 2;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar h2 {
        margin: 0;
        font-size: 1.2rem;
        letter-spacing: 0.06em;
      }

      .side-links a,
      .side-links button {
        display: block;
        width: 100%;
        text-align: left;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
      }

      .side-links {
        display: grid;
        gap: 12px;
      }

      .sidebar-footer {
        margin-top: auto;
        display: grid;
        gap: 12px;
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .theme-icon {
        font-size: 1.1rem;
      }

      .chat-shell {
        display: grid;
        grid-template-columns: minmax(220px, 280px) 1fr;
        gap: 18px;
        min-height: 520px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px;
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      }

      .contacts {
        display: grid;
        gap: 12px;
      }

      .contact {
        display: grid;
        grid-template-columns: 48px 1fr;
        gap: 12px;
        align-items: center;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid transparent;
        background: var(--surface);
        cursor: pointer;
      }

      .contact.active {
        border-color: var(--accent);
        background: rgba(74, 217, 255, 0.12);
      }

      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.2);
        display: grid;
        place-items: center;
        font-size: 1.4rem;
        background: var(--surface);
      }

      .contact small {
        color: var(--muted);
      }

      .chat-area {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
      }

      .chat-header {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .chat-header h3 {
        margin: 0;
      }

      .typing {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .messages {
        display: grid;
        gap: 10px;
        padding: 8px 4px;
        overflow-y: auto;
        max-height: 360px;
      }

      .placeholder {
        display: grid;
        place-items: center;
        height: 100%;
        color: var(--muted);
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .bubble {
        max-width: 70%;
        padding: 10px 14px;
        padding-right: 36px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        line-height: 1.4;
        word-break: break-word;
        overflow-wrap: anywhere;
        position: relative;
      }

      .bubble-time {
        margin-top: 6px;
        font-size: 0.75rem;
        color: var(--muted);
        text-align: right;
      }

      .reactions {
        margin-top: 6px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .reaction-chip {
        padding: 3px 6px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 0.85rem;
        cursor: pointer;
      }

      .reaction-btn {
        position: absolute;
        top: 6px;
        left: 6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.8rem;
        display: grid;
        place-items: center;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.15s ease, transform 0.15s ease;
      }

      .bubble:hover .reaction-btn {
        opacity: 1;
        transform: scale(1.05);
      }

      .reaction-picker {
        position: absolute;
        top: -34px;
        left: 0;
        display: flex;
        gap: 6px;
        padding: 6px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      .bubble.me {
        justify-self: end;
        background: rgba(74, 217, 255, 0.16);
        border-color: rgba(74, 217, 255, 0.4);
      }

      .reply-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.8rem;
        display: grid;
        place-items: center;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.15s ease, transform 0.15s ease;
      }

      .bubble:hover .reply-btn {
        opacity: 1;
        transform: scale(1.05);
      }

      .reply-preview {
        border-left: 3px solid var(--accent);
        padding: 6px 10px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        font-size: 0.9rem;
        color: var(--muted);
        display: grid;
        gap: 2px;
      }

      .reply-bar {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 8px 10px;
        border-radius: 10px;
      }

      .reply-bar.active {
        display: flex;
      }

      .reply-bar button {
        border: none;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
      }

      .composer {
        display: grid;
        gap: 10px;
        position: relative;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 10px;
        align-items: end;
      }

      .composer input {
        display: none;
      }

      .send-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: none;
        background: var(--accent);
        color: #001018;
        font-weight: 700;
        cursor: pointer;
      }

      .attach-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-size: 1.1rem;
      }

      .message-input {
        width: 100%;
        min-height: 42px;
        max-height: 180px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 1rem;
        resize: none;
        overflow: hidden;
        line-height: 1.4;
      }

      .file-input {
        display: none;
      }

      .contact-meta {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .requests {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }

      .request-item {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
        padding: 8px;
        border-radius: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        font-size: 0.9rem;
      }

      .request-item button {
        border: none;
        padding: 6px 8px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
      }

      .btn-accept {
        background: var(--accent);
        color: #001018;
      }

      .btn-decline {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .add-friend {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .add-friend input {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.95rem;
      }

      .add-friend button {
        padding: 8px 10px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #001018;
        font-weight: 700;
        cursor: pointer;
      }

      .emoji-panel {
        display: none;
        position: absolute;
        right: 70px;
        bottom: 64px;
        width: min(320px, 90vw);
        max-height: 320px;
        overflow: hidden;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .emoji-panel.open {
        display: flex;
      }

      .emoji-panel button,
      .emoji-toggle {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 10px;
        padding: 6px 8px;
        font-size: 1.1rem;
        cursor: pointer;
      }

      .emoji-toggle {
        width: 42px;
        height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .emoji-header {
        width: 100%;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .frequent-row {
        display: flex;
        gap: 8px;
      }

      .emoji-search {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.95rem;
      }

      .emoji-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
        gap: 8px;
        overflow-y: auto;
        padding-right: 6px;
        max-height: 200px;
      }

      .emoji-grid button {
        font-size: 1.1rem;
      }

      @media (max-width: 900px) {
        .chat-shell {
          grid-template-columns: 1fr;
        }
      }

      .profile-shell {
        display: grid;
        place-items: center;
      }

      .profile-card {
        width: min(520px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        display: grid;
        gap: 12px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      }

      .profile-card input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 1rem;
      }

      .profile-card button {
        padding: 10px 12px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #001018;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
      <h2>Menu</h2>
      <div class="side-links">
        <a href="#chat" id="chatLink">Chat</a>
        <a href="#friends">Friends</a>
        <a href="#projects">Projects</a>
        <a href="#profile" id="profileLink">Profile</a>
      </div>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle">
          <span class="theme-icon" id="themeIcon">MOON</span>
          <span id="themeText">Dark mode</span>
        </button>
        <a href="index.html">Log out</a>
      </div>
    </aside>

    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">MENU</button>
      <div></div>
    </header>

    <main class="page">
      <div class="home-title" id="homeTitle">Home</div>

      <section class="chat-shell" id="chat" hidden>
        <div class="panel">
          <h3>Contacts</h3>
          <div class="add-friend">
            <input
              id="friendEmail"
              type="email"
              placeholder="Add friend by email"
            />
            <button id="addFriendBtn" type="button">Add Friend</button>
          </div>
          <div class="contacts">
            <div class="contact" id="contactSelf">
              <img
                class="avatar"
                alt="Panda avatar"
                src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><rect width='160' height='160' fill='%23f2f5ff'/><circle cx='48' cy='56' r='22' fill='%2323262f'/><circle cx='112' cy='56' r='22' fill='%2323262f'/><circle cx='80' cy='92' r='48' fill='%23ffffff' stroke='%2323262f' stroke-width='6'/><circle cx='62' cy='86' r='10' fill='%2323262f'/><circle cx='98' cy='86' r='10' fill='%2323262f'/><circle cx='80' cy='106' r='8' fill='%2323262f'/></svg>"
              />
              <div>
                <strong>Myself</strong>
                <div><small>Online</small></div>
              </div>
            </div>
            <div class="contact" id="contactSaved">
              <img
                class="avatar"
                alt="Saved messages"
                src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><rect width='160' height='160' fill='%23f2f5ff'/><rect x='40' y='30' width='80' height='100' rx='16' fill='%23ffd166' stroke='%2323262f' stroke-width='6'/><rect x='54' y='52' width='52' height='10' rx='5' fill='%2323262f'/><rect x='54' y='72' width='52' height='10' rx='5' fill='%2323262f'/><rect x='54' y='92' width='40' height='10' rx='5' fill='%2323262f'/></svg>"
              />
              <div>
                <strong>Saved Messages</strong>
                <div><small>Notes</small></div>
              </div>
            </div>
            <div id="friendList"></div>
            <div class="requests">
              <div class="contact-meta">Requests</div>
              <div id="requestList"></div>
            </div>
          </div>
        </div>

        <div class="panel chat-area">
          <div class="placeholder" id="chatPlaceholder">
            Click a contact to see the chat.
          </div>

          <div id="chatContent" hidden>
            <div class="chat-header">
              <img
                class="avatar"
                id="chatAvatar"
                alt="Profile"
                src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><rect width='160' height='160' fill='%23f2f5ff'/><circle cx='48' cy='56' r='22' fill='%2323262f'/><circle cx='112' cy='56' r='22' fill='%2323262f'/><circle cx='80' cy='92' r='48' fill='%23ffffff' stroke='%2323262f' stroke-width='6'/><circle cx='62' cy='86' r='10' fill='%2323262f'/><circle cx='98' cy='86' r='10' fill='%2323262f'/><circle cx='80' cy='106' r='8' fill='%2323262f'/></svg>"
              />
              <div>
                <h3 id="chatName">Myself</h3>
                <div class="typing" id="typingStatus"></div>
                <div class="typing" id="seenStatus"></div>
              </div>
            </div>

            <div class="messages" id="messageList"></div>

            <div class="composer">
              <div class="reply-bar" id="replyBar">
                <div id="replyText">Replying to:</div>
                <button type="button" id="replyClose">x</button>
              </div>
              <div class="input-row">
                <textarea
                  id="chatInput"
                  class="message-input"
                  rows="1"
                  placeholder="Type a message..."
                ></textarea>
                <input
                  id="fileInput"
                  class="file-input"
                  type="file"
                  accept="image/*,video/*"
                />
                <button class="attach-btn" id="attachBtn" type="button">+</button>
                <button class="emoji-toggle" id="emojiToggle" type="button">🙂</button>
                <button class="send-btn" id="sendBtn" aria-label="Send">
                  ↑
                </button>
              </div>
              <div class="emoji-panel" id="emojiPanel">
                <div class="emoji-header">Search</div>
                <input
                  class="emoji-search"
                  id="emojiSearch"
                  type="text"
                  placeholder="Type emoji name..."
                />
                <div class="emoji-header">Recent</div>
                <div class="frequent-row" id="frequentRow"></div>
                <div class="emoji-header">All emojis</div>
                <div class="emoji-grid" id="emojiGrid"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="profile-shell" id="profile" hidden>
        <div class="profile-card">
          <h3>Your Profile</h3>
          <input id="profileName" type="text" placeholder="Display name" />
          <input id="profileStatus" type="text" placeholder="Status message" />
          <button id="saveProfileBtn" type="button">Save Profile</button>
          <div class="contact-meta" id="profileMsg"></div>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const offline = localStorage.getItem("offline_mode") === "1";
        if (offline || !navigator.onLine) {
          const mod = document.querySelector("script[data-app-module]");
          if (mod) mod.remove();
          const s = document.createElement("script");
          s.src = "offline.js";
          document.body.appendChild(s);
        }
      })();
    </script>

    <script type="module" data-app-module>
  import { auth, db } from "./firebase-config.js";
  import {
    onAuthStateChanged,
    signOut,
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import {
    collection,
    addDoc,
    serverTimestamp,
    query,
    orderBy,
    onSnapshot,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    where,
    getDocs,
    deleteDoc,
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  import {
    getStorage,
    ref,
    uploadBytes,
    getDownloadURL,
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

  const storage = getStorage();

  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const menuBtn = document.getElementById("menuBtn");
  const themeToggle = document.getElementById("themeToggle");
  const themeIcon = document.getElementById("themeIcon");
  const themeText = document.getElementById("themeText");

  function openSidebar() {
    sidebar.classList.add("open");
    overlay.classList.add("open");
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    overlay.classList.remove("open");
  }

  menuBtn.addEventListener("click", openSidebar);
  overlay.addEventListener("click", closeSidebar);

  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("light");
    const isLight = document.body.classList.contains("light");
    themeIcon.textContent = isLight ? "SUN" : "MOON";
    themeText.textContent = isLight ? "Light mode" : "Dark mode";
  });

  const chatLink = document.getElementById("chatLink");
  const profileLink = document.getElementById("profileLink");
  const chatSection = document.getElementById("chat");
  const profileSection = document.getElementById("profile");
  const homeTitle = document.getElementById("homeTitle");
  const chatPlaceholder = document.getElementById("chatPlaceholder");
  const chatContent = document.getElementById("chatContent");
  const contactSelf = document.getElementById("contactSelf");
  const contactSaved = document.getElementById("contactSaved");
  const chatName = document.getElementById("chatName");
  const chatAvatar = document.getElementById("chatAvatar");
  const typingStatus = document.getElementById("typingStatus");
  const seenStatus = document.getElementById("seenStatus");
  const friendEmail = document.getElementById("friendEmail");
  const addFriendBtn = document.getElementById("addFriendBtn");
  const friendList = document.getElementById("friendList");
  const requestList = document.getElementById("requestList");
  const profileName = document.getElementById("profileName");
  const profileStatus = document.getElementById("profileStatus");
  const saveProfileBtn = document.getElementById("saveProfileBtn");

  async function openContact(name, avatarSrc, activeEl, chatId, type, otherUid) {
    if (!currentUser) return;
    const isOffline = currentUser.uid === "offline-demo";
    chatPlaceholder.hidden = true;
    chatContent.hidden = false;
    chatName.textContent = name;
    chatAvatar.src = avatarSrc;
    typingStatus.textContent = "";
    seenStatus.textContent = "";
    contactSelf.classList.remove("active");
    contactSaved.classList.remove("active");
    if (activeEl) activeEl.classList.add("active");
    clearReply();

    if (unsubscribeMessages) unsubscribeMessages();
    if (unsubscribeTyping) unsubscribeTyping();
    if (unsubscribeReads) unsubscribeReads();

    activeChat = chatId;
    activeChatType = type;

    if (isOffline) {
      currentMessages = offlineChats[chatId] || [];
      renderMessages();
      return;
    }

    if (type === "direct") {
      const chatDoc = doc(db, "chats", chatId);
      await setDoc(
        chatDoc,
        { participants: [currentUser.uid, otherUid], updatedAt: serverTimestamp() },
        { merge: true }
      );
    }

    let messagesRef;
    if (type === "direct") {
      messagesRef = collection(db, "chats", chatId, "messages");
      const typingRef = collection(db, "chats", chatId, "typing");
      unsubscribeTyping = onSnapshot(typingRef, (snap) => {
        const other = snap.docs
          .map((d) => d.data())
          .find((t) => t.uid !== currentUser.uid && t.isTyping);
        typingStatus.textContent = other ? "typing..." : "";
      });

      const readsRef = collection(db, "chats", chatId, "reads");
      unsubscribeReads = onSnapshot(readsRef, (snap) => {
        const other = snap.docs
          .map((d) => d.data())
          .find((r) => r.uid !== currentUser.uid);
        otherReadAt = other?.lastRead || null;
        renderMessages();
      });
    } else {
      messagesRef = collection(db, "users", currentUser.uid, "chats", chatId, "messages");
    }

    const q = query(messagesRef, orderBy("createdAt", "asc"));
    unsubscribeMessages = onSnapshot(q, (snap) => {
      currentMessages = snap.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
      renderMessages();

      if (activeChatType === "direct") {
        const readDoc = doc(db, "chats", activeChat, "reads", currentUser.uid);
        setDoc(readDoc, { uid: currentUser.uid, lastRead: serverTimestamp() }, { merge: true });
      }
    });
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    if (!activeChat || !currentUser) return;
    const isOffline = currentUser.uid === "offline-demo";

    if (isOffline) {
      const msg = {
        id: `offline-${Date.now()}`,
        text,
        type: "text",
        senderId: currentUser.uid,
        replyTo: replyTargetId || null,
        createdAt: new Date(),
        reactions: [],
      };
      offlineChats[activeChat] = offlineChats[activeChat] || [];
      offlineChats[activeChat].push(msg);
      currentMessages = offlineChats[activeChat];
      renderMessages();
      chatInput.value = "";
      resizeInput();
      clearReply();
      return;
    }

    let messagesRef;
    if (activeChatType === "direct") {
      messagesRef = collection(db, "chats", activeChat, "messages");
    } else {
      messagesRef = collection(db, "users", currentUser.uid, "chats", activeChat, "messages");
    }

    await addDoc(messagesRef, {
      text,
      type: "text",
      senderId: currentUser.uid,
      replyTo: replyTargetId || null,
      createdAt: serverTimestamp(),
      reactions: [],
    });

    chatInput.value = "";
    resizeInput();
    clearReply();
  }

  async function uploadAttachment() {
    const file = fileInput.files[0];
    if (!file || !currentUser || !activeChat) return;
    if (currentUser.uid === "offline-demo") {
      alert("Attachments are not available in offline mode.");
      fileInput.value = "";
      return;
    }

    const path = `uploads/${currentUser.uid}/${activeChat}/${Date.now()}-${file.name}`;
    const storageRef = ref(storage, path);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    const type = file.type.startsWith("video") ? "video" : "image";

    let messagesRef;
    if (activeChatType === "direct") {
      messagesRef = collection(db, "chats", activeChat, "messages");
    } else {
      messagesRef = collection(db, "users", currentUser.uid, "chats", activeChat, "messages");
    }

    await addDoc(messagesRef, {
      text: "",
      url,
      type,
      senderId: currentUser.uid,
      replyTo: replyTargetId || null,
      createdAt: serverTimestamp(),
      reactions: [],
    });

    fileInput.value = "";
    clearReply();
  }

  function getMessagesRef() {
    if (!currentUser || !activeChat) return null;
    if (activeChatType === "direct") {
      return collection(db, "chats", activeChat, "messages");
    }
    return collection(db, "users", currentUser.uid, "chats", activeChat, "messages");
  }

  async function deleteMessage(msgId) {
    if (currentUser && currentUser.uid === "offline-demo") {
      offlineChats[activeChat] = (offlineChats[activeChat] || []).filter((m) => m.id !== msgId);
      currentMessages = offlineChats[activeChat];
      renderMessages();
      return;
    }
    const ref = activeChatType === "direct"
      ? doc(db, "chats", activeChat, "messages", msgId)
      : doc(db, "users", currentUser.uid, "chats", activeChat, "messages", msgId);
    await deleteDoc(ref);
  }

  async function clearActiveChat() {
    if (!currentUser || !activeChat) return;
    if (currentUser.uid === "offline-demo") {
      offlineChats[activeChat] = [];
      currentMessages = [];
      renderMessages();
      return;
    }
    const messagesRef = getMessagesRef();
    if (!messagesRef) return;
    const snap = await getDocs(messagesRef);
    const deletions = snap.docs.map((d) => deleteDoc(d.ref));
    await Promise.all(deletions);
  }

  function scheduleTyping() {
    if (!activeChat || activeChatType !== "direct" || !currentUser) return;
    if (currentUser.uid === "offline-demo") return;
    const typingDoc = doc(db, "chats", activeChat, "typing", currentUser.uid);
    setDoc(typingDoc, {
      uid: currentUser.uid,
      isTyping: true,
      updatedAt: serverTimestamp(),

    if (typingTimer) clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      setDoc(typingDoc, {
        uid: currentUser.uid,
        isTyping: false,
        updatedAt: serverTimestamp(),
      });
    }, 1500);
  }

  async function toggleReaction(msgId, emoji) {
    if (!activeChat || !currentUser) return;
    if (currentUser.uid === "offline-demo") return;
    const msg = currentMessages.find((m) => m.id === msgId);
    if (!msg) return;

    const reactions = msg.reactions ? [...msg.reactions] : [];
    const idx = reactions.findIndex((r) => r.emoji === emoji);
    if (idx === -1) {
      reactions.push({ emoji, uids: [currentUser.uid] });
    } else {
      const uids = new Set(reactions[idx].uids || []);
      if (uids.has(currentUser.uid)) {
        uids.delete(currentUser.uid);
      } else {
        uids.add(currentUser.uid);
      }
      if (uids.size === 0) {
        reactions.splice(idx, 1);
      } else {
        reactions[idx].uids = Array.from(uids);
      }
    }

    const docRef = activeChatType === "direct"
      ? doc(db, "chats", activeChat, "messages", msgId)
      : doc(db, "users", currentUser.uid, "chats", activeChat, "messages", msgId);

    await updateDoc(docRef, { reactions });
  }

  function syncPresenceListeners(friendIds) {
    const newSet = new Set(friendIds);
    for (const [uid, unsub] of presenceUnsubs.entries()) {
      if (!newSet.has(uid)) {
        unsub();
        presenceUnsubs.delete(uid);
        presenceMap.delete(uid);
      }
    }
    friendIds.forEach((uid) => {
      if (presenceUnsubs.has(uid)) return;
      const pDoc = doc(db, "presence", uid);
      const unsub = onSnapshot(pDoc, (snap) => {
        presenceMap.set(uid, snap.exists() ? snap.data() : null);
        renderFriends(currentFriendsData);
      });
      presenceUnsubs.set(uid, unsub);
    });
  }

    openContact(
      "Saved Messages",
      "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><rect width='160' height='160' fill='%23f2f5ff'/><rect x='40' y='30' width='80' height='100' rx='16' fill='%23ffd166' stroke='%2323262f' stroke-width='6'/><rect x='54' y='52' width='52' height='10' rx='5' fill='%2323262f'/><rect x='54' y='72' width='52' height='10' rx='5' fill='%2323262f'/><rect x='54' y='92' width='40' height='10' rx='5' fill='%2323262f'/></svg>",
      contactSaved,
      "saved",
      "saved"
    );
  });

  contactSelf.addEventListener("contextmenu", async (event) => {
    event.preventDefault();
    const ok = confirm("Clear all messages in this chat?");
    if (ok) {
      activeChat = "self";
      activeChatType = "self";
      await clearActiveChat();
    }
  });

  contactSaved.addEventListener("contextmenu", async (event) => {
    event.preventDefault();
    const ok = confirm("Clear all messages in this chat?");
    if (ok) {
      activeChat = "saved";
      activeChatType = "saved";
      await clearActiveChat();
    }
  });

  saveProfileBtn.addEventListener("click", async () => {
    if (!currentUser) return;
    const userDoc = doc(db, "users", currentUser.uid);
    await updateDoc(userDoc, {
      name: profileName.value.trim(),
      status: profileStatus.value.trim(),
    });
    profileMsg.textContent = "Profile updated.";
    setTimeout(() => (profileMsg.textContent = ""), 2000);
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      const offline = localStorage.getItem("offline_mode") === "1";
      if (offline) {
        currentUser = { uid: "offline-demo", email: "offline@demo", displayName: "Offline User" };
        chatSection.hidden = false;
        homeTitle.hidden = true;
        const betaContact = {
          uid: "offline-friend",
          name: "Beta Friend",
          email: "beta@offline",
        };
        currentFriendsData = [betaContact];
        renderFriends(currentFriendsData);
      } else {
        window.location.href = "login.html";
        return;
      }
    } else {
      currentUser = user;
    }

    if (currentUser.uid === "offline-demo") {
      profileName.value = currentUser.displayName || "";
      profileStatus.value = "Offline mode";
      renderFriends([]);
      return;
    }

    const userDoc = doc(db, "users", currentUser.uid);
    const userSnap = await getDoc(userDoc);
    if (!userSnap.exists()) {
      await setDoc(userDoc, {
        uid: currentUser.uid,
        email: currentUser.email || "",
        name: currentUser.displayName || "",
        status: "",
        createdAt: serverTimestamp(),
      });
    }

    const presenceDoc = doc(db, "presence", currentUser.uid);
    await setDoc(presenceDoc, { uid: currentUser.uid, state: "online", lastSeen: serverTimestamp() }, { merge: true });
    setInterval(() => {
      setDoc(presenceDoc, { uid: currentUser.uid, state: "online", lastSeen: serverTimestamp() }, { merge: true });
    }, 30000);
    window.addEventListener("beforeunload", () => {
      setDoc(presenceDoc, { uid: currentUser.uid, state: "offline", lastSeen: serverTimestamp() }, { merge: true });
    });

    if (unsubscribeChats) unsubscribeChats();
    const chatsRef = collection(db, "chats");
    const chatsQuery = query(chatsRef, where("participants", "array-contains", currentUser.uid));
    unsubscribeChats = onSnapshot(chatsQuery, async (snap) => {
      const chats = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      const otherIds = Array.from(
        new Set(
          chats.flatMap((c) => c.participants || []).filter((id) => id !== user.uid)
        )
      );
      const friendDocs = await Promise.all(otherIds.map((fid) => getDoc(doc(db, "users", fid))));
      currentFriendsData = friendDocs
        .filter((d) => d.exists())
        .map((d) => ({ uid: d.id, ...d.data() }));
      syncPresenceListeners(currentFriendsData.map((f) => f.uid));
      renderFriends(currentFriendsData);
    });

    const reqRef = collection(db, "users", user.uid, "requests");
    onSnapshot(query(reqRef, where("status", "==", "pending")), (snap) => {
      const reqs = snap.docs.map((d) => d.data());
      renderRequests(reqs);
    });

    onSnapshot(userDoc, (snap) => {
      const data = snap.data() || {};
      profileName.value = data.name || "";
      profileStatus.value = data.status || "";
    });
  });

  document.querySelector("a[href='index.html']").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "index.html";
  });
</script>
  </body>
</html>
